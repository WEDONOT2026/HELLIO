<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f23;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            animation: fadeIn 1.2s ease-out;
        }
        .glitch {
            font-size: 140px;
            font-weight: 900;
            color: #ff0055;
            text-shadow: 
                4px 4px 0 #00ffee,
                -4px -4px 0 #ff00aa,
                0 0 40px rgba(255, 0, 85, 0.3);
            letter-spacing: 15px;
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0%, 100% { transform: skew(0deg); }
            2% { transform: skew(5deg); }
            4% { transform: skew(-5deg); }
            6% { transform: skew(0deg); }
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        p {
            font-size: 22px;
            color: #ccc;
            margin-top: 20px;
            letter-spacing: 3px;
        }
        .sub {
            font-size: 14px;
            color: #666;
            margin-top: 12px;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 32px;
            background: #ff0055;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .back-link:hover {
            background: #ff3377;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glitch">404</div>
        <p>Page Not Found</p>
        <p class="sub">The requested page could not be found on this server</p>
        <a href="/HELLIO/" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
