<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#667eea,#764ba2);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}.container{text-align:center;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);padding:60px 80px;border-radius:24px;border:1px solid rgba(255,255,255,0.25);box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:fadeIn 1s ease-out}h1{font-size:72px;font-weight:700;color:#fff;margin:0;letter-spacing:4px;text-shadow:0 4px 20px rgba(0,0,0,0.3)}p{font-size:18px;color:rgba(255,255,255,0.8);margin-top:16px;letter-spacing:2px}.timer{font-size:48px;color:#fff;margin-top:20px;font-weight:300}.sub{font-size:14px;opacity:0.6}@keyframes fadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}@media(max-width:480px){.container{padding:40px 30px}h1{font-size:44px}.timer{font-size:32px}}
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World</h1>
        <p>欢迎来到我的第一个网页</p>
        <div class="timer" id="countdown">3</div>
        <p class="sub">秒后自动跳转...</p>
    </div>
    <script>
        const TARGET_URL = '/HELLIO/404.html';
        let seconds = 3;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds -= 1;
            el.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = TARGET_URL;
            }
        }, 1000);
    </script>
</body>
</html>
